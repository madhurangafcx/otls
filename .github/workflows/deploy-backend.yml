name: Deploy backend to Fly.io

# Deploys on any push to main that touches backend code (or this workflow
# itself). Manual trigger is also available from the Actions tab. Concurrency
# group ensures we never run two deploys in parallel for the same branch.

on:
  push:
    branches: [main]
    paths:
      - 'apps/backend/**'
      - 'package.json'
      - 'bun.lock'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

concurrency:
  group: deploy-backend-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: fly deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        run: flyctl deploy --remote-only --config apps/backend/fly.toml --dockerfile apps/backend/Dockerfile .
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
